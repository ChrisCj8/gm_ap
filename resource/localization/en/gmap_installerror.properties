
gmap.installerrorui.title=GMAP Install Error
gmap.installerrorui.error.notfound=GWSockets could not be found in the Garrysmod/garrysmod/lua/bin/ folder. Make sure you have installed it to the right directory.
gmap.installerrorui.error.wrongos=It seems like you have installed the wrong version of GWSockets. Make sure you have installed the right version of GWSockets for your operating system and branch (32/64-bit).
gmap.installerrorui.error.wrongarchwin64=You seem to be playing on the 64-bit branch of GMod on Windows, but have installed the .dll for the 32-bit branch. You need to install the 64-bit Windows version of GWSockets.
gmap.installerrorui.error.wrongarchwin32=You seem to be playing on the 32-bit branch of GMod on Windows, but have installed the .dll for the 64-bit branch. You need to install the 32-bit Windows version of GWSockets.
gmap.installerrorui.error.wrongarchlinux64=You seem to be playing on the 64-bit branch of GMod on Linux, but have installed the .dll for the 32-bit branch. You need to install the 64-bit Linux version of GWSockets.
gmap.installerrorui.error.wrongarchlinux32=You seem to be playing on the 32-bit branch of GMod on Linux, but have installed the .dll for the 64-bit branch. You need to install the 32-bit Linux version of GWSockets.
